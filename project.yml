name: OpenClawDashboard
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: YES

targets:
  OpenClawDashboard:
    type: application
    platform: macOS
    sources:
      - OpenClawDashboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.dashboard
        INFOPLIST_FILE: OpenClawDashboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenClawDashboard/OpenClawDashboard.entitlements
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
    info:
      path: OpenClawDashboard/Info.plist
      properties:
        CFBundleName: OpenClawDashboard
        CFBundleDisplayName: OpenClaw Dashboard
        CFBundleIdentifier: com.openclaw.dashboard
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: OpenClawDashboard
        LSMinimumSystemVersion: "13.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        LSApplicationCategoryType: public.app-category.developer-tools
